<!-- pendaftaran -->
<section id="pendaftaran" class="py-5 bg-light" style="margin-top: 80px;">
    <div class="container">

        <h2 class="text-center mb-4">
            Pendaftaran Anggota Baru PERISAI DIRI
        </h2>

        <div class="row justify-content-center">

            <div class="col-md-8">

                <form id="formPendaftaran">

                    <div class="mb-3">
                        <label class="form-label">
                            Nama Lengkap
                        </label>

                        <input type="text"
                               class="form-control"
                               id="nama"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Sekolah Asal
                        </label>

                        <input type="text"
                               class="form-control"
                               id="sekolah"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Umur
                        </label>

                        <input type="number"
                               class="form-control"
                               id="umur"
                               required>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Tempat Lahir
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="tempatLahir"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Tanggal Lahir
                            </label>

                            <input type="date"
                                   class="form-control"
                                   id="tanggalLahir"
                                   required>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nomor WhatsApp
                        </label>

                        <input type="tel"
                               class="form-control"
                               id="whatsapp"
                               placeholder="08xxxxxxxxxx"
                               required>
                    </div>
                    
                    <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" id="email" required>
</div>

                    <div class="mb-3">
                        <label class="form-label">
                            Alamat
                        </label>

                        <textarea class="form-control"
                                  id="alamat"
                                  rows="3"
                                  required></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-danger w-100">
                        Daftar Sekarang
                    </button>

                </form>

            </div>

        </div>

    </div>
</section>
<!-- pendaftaran end -->

 <script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwWwrJSxcymnkMaiVGfDPyq836JYU7Oc3sNi9-CyxyEZw8XCjZjqbwVayqVdYAMzkRM3w/exec";

document
    .getElementById("formPendaftaran")
    .addEventListener("submit", function (e) {

        e.preventDefault();

        const data = {
    nama: document.getElementById("nama").value,
    sekolah: document.getElementById("sekolah").value,
    umur: document.getElementById("umur").value,
    tempatLahir: document.getElementById("tempatLahir").value,
    tanggalLahir: document.getElementById("tanggalLahir").value,
    whatsapp: document.getElementById("whatsapp").value,
    alamat: document.getElementById("alamat").value,
    email: document.getElementById("email").value
};
        fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
})
.then(response => response.json())
.then(result => {

    if (result.status === "gagal") {

        alert("Gagal mendaftar! Email sudah terdaftar.");

    } else {

        alert("Pendaftaran berhasil dikirim!");
        document.getElementById("formPendaftaran").reset();

    }

})
.catch((error) => {

    alert("Terjadi kesalahan.");
    console.log(error);

});

});

</script>
